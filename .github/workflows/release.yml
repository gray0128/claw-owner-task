name: Release CLI Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact_name: claw-task-linux
          - os: macos-latest
            target: bun-macos-x64
            artifact_name: claw-task-macos
          - os: windows-latest
            target: bun-windows-x64
            artifact_name: claw-task.exe

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Binary
        run: |
          mkdir -p bin
          bun build ./src/cli/index.js --compile --target=${{ matrix.target }} --outfile=bin/${{ matrix.artifact_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin-dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin-dist/claw-task-linux
            bin-dist/claw-task-macos
            bin-dist/claw-task.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
