name: Release CLI Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: claw-task-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: claw-task-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: claw-task-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: claw-task.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        working-directory: cli-rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp cli-rust/target/${{ matrix.target }}/release/claw-task ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: cp cli-rust/target/${{ matrix.target }}/release/claw-task.exe ${{ matrix.artifact_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin-dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin-dist/claw-task-linux
            bin-dist/claw-task-macos-arm64
            bin-dist/claw-task-macos-x64
            bin-dist/claw-task.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
