name = "claw-owner-task"
main = "src/worker/index.ts"
compatibility_date = "2024-02-22"
workers_dev = true

# Static assets configuration (automatically serves files from src/web directory)
[assets]
directory = "src/web"


# D1 Database binding
# IMPORTANT: Replace database_id with your own D1 database ID after running: npx wrangler d1 create claw-owner-task-db
[[d1_databases]]
binding = "DB"
database_name = "claw-owner-task-db"
database_id = "your-database-id-here"
migrations_dir = "src/worker/db/migrations"

# Environment Variables
[vars]
# Required: System core timezone
USER_TIMEZONE = "Asia/Shanghai"

# Optional: AI parser switch (true/false)
ENABLE_AI = true
AI_MODEL = "@cf/zai-org/glm-4.7-flash"

# Optional: Auto summary schedule time (e.g. "09:00,21:00")
CRON_SUMMARY_TIME = "09:00,21:00"

# Optional: Base URL for web sharing links. Leave empty if you don't need sharing, or replace with your domain.
BASE_URL = "https://your-domain.com"

# Optional: GitHub OAuth Configuration (for GitHub login feature)
# GITHUB_OAUTH_CLIENT_ID = "YOUR_GITHUB_CLIENT_ID"
# GITHUB_OAUTH_REDIRECT_URI = "https://your-domain.com/api/auth/github/callback"
# GITHUB_ALLOWED_USER_ID = "YOUR_GITHUB_USER_ID"
# GITHUB_ALLOWED_USERNAME = "YOUR_GITHUB_USERNAME"

# 自定义域名绑定 (可选)
# 作用: 将你的独立域名绑定到该 Worker，Cloudflare 会自动接管 DNS 记录并配置 HTTPS。
# 前提: pattern 中的主域名必须已经托管在你当前部署使用的 Cloudflare 账号下。
# [[routes]]
# pattern = "claw-task.your-domain.com"
# custom_domain = true

[ai]
binding = "AI"

# Scheduled Tasks (Cron Triggers)
# triggers every 1 minute for cloud bark notifications
[triggers]
crons = ["* * * * *"]

[dev]
port = 8787

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = false

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[r2_buckets]]
binding = "AUDIO_BUCKET"
# IMPORTANT: Must match the bucket name you created via: npx wrangler r2 bucket create volcengine-asr
bucket_name = "volcengine-asr"
