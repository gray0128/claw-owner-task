name = "claw-owner-task"
main = "src/worker/index.ts"
compatibility_date = "2024-02-22"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "claw-owner-task-db"
database_id = "41d719b2-4bb9-42b9-b0cd-59b15e7bfabf" # Database ID for claw-owner-task-db
migrations_dir = "src/worker/db/migrations"

# Environment Variables
[vars]
USER_TIMEZONE = "Asia/Shanghai"
ENABLE_AI = true
CRON_SUMMARY_TIME = "09:00,21:00" # 定时总结时间点，多个用逗号分隔 (HH:mm)
BASE_URL = "https://claw-task.bobocai.win" # 你的自定义域名 (例如 "https://your-custom-domain.com")，用于生成链接

[[routes]]
pattern = "claw-task.bobocai.win"
custom_domain = true


# QQ Bot Configuration (Fill in your values)
# QQ_APP_ID = "YOUR_APP_ID"
# QQ_APP_SECRET = "YOUR_APP_SECRET"
# QQ_ALLOWED_OPENID = "YOUR_OPENID"

# Feishu Bot Configuration (Fill in your values)
# FEISHU_APP_ID = "YOUR_FEISHU_APP_ID"
# FEISHU_APP_SECRET = "YOUR_FEISHU_APP_SECRET"
# FEISHU_VERIFY_TOKEN = "YOUR_VERIFY_TOKEN"
# FEISHU_ENCRYPT_KEY = "YOUR_ENCRYPT_KEY"
# FEISHU_ALLOWED_CHAT_ID = "YOUR_ALLOWED_CHAT_ID"

[ai]
binding = "AI"

# Scheduled Tasks (Cron Triggers)
# triggers every 1 minute for cloud bark notifications
[triggers]
crons = ["* * * * *"]

[dev]
port = 8787

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = false

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
